name: iOS IPA (arm64 arm64e)

on:
  workflow_dispatch:
    inputs:
      artifact_label:
        description: "Artifact label to use for this iOS IPA build."
        required: false
        default: "arm64-arm64e"
        type: string
      ios_device_archs:
        description: "Device architectures. arm64e is used only when the provided iOS MoltenVK slice supports it."
        required: true
        default: "arm64,arm64e"
        type: string
  push:
    branches-ignore:
      - 'l10n_**' # Push events to translation service branches (that begin with "l10n_")
  pull_request:
    paths-ignore:
      # Except some text-only files / documentation
      - 'ChangeLog'
      # Except those that only include changes to stats
      - 'data/base/stats/**'
      - 'data/mp/stats/**'
      - 'data/mp/multiplay/script/functions/camTechEnabler.js'
      # Linux-specific example scripts
      - 'doc/hosting/linux_scripts/**'

concurrency:
  group: ios-ipa-arm64-arm64e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-ios-ipa:
    name: Build iOS IPA (arm64 arm64e)
    runs-on: macos-latest
    timeout-minutes: 180
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: false

      - name: Prepare iOS build settings
        shell: bash
        env:
          DISPATCH_ARTIFACT_LABEL: ${{ inputs.artifact_label }}
          DISPATCH_DEVICE_ARCHS: ${{ inputs.ios_device_archs }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ARTIFACT_LABEL="${DISPATCH_ARTIFACT_LABEL:-arm64-arm64e}"
            DEVICE_ARCHS="${DISPATCH_DEVICE_ARCHS:-arm64,arm64e}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            ARTIFACT_LABEL="pr-${GITHUB_HEAD_REF:-unknown}-${GITHUB_SHA:0:12}"
            DEVICE_ARCHS="arm64,arm64e"
          else
            ARTIFACT_LABEL="${GITHUB_REF_NAME:-arm64-arm64e}-${GITHUB_SHA:0:12}"
            DEVICE_ARCHS="arm64,arm64e"
          fi

          ARTIFACT_LABEL="$(printf '%s' "${ARTIFACT_LABEL:-arm64-arm64e}" | tr -c 'A-Za-z0-9._-' '-')"
          ARTIFACT_LABEL="${ARTIFACT_LABEL#-}"
          ARTIFACT_LABEL="${ARTIFACT_LABEL%-}"
          if [[ -z "${ARTIFACT_LABEL}" ]]; then
            ARTIFACT_LABEL="arm64-arm64e-${GITHUB_SHA:0:12}"
          fi
          if [[ "${DEVICE_ARCHS}" != "arm64" && "${DEVICE_ARCHS}" != "arm64,arm64e" && "${DEVICE_ARCHS}" != "arm64e,arm64" ]]; then
            echo "::error::Unsupported iOS device architectures '${DEVICE_ARCHS}'. Use arm64, or arm64,arm64e only when MoltenVK has matching slices."
            exit 1
          fi

          echo "IOS_ARTIFACT_LABEL=${ARTIFACT_LABEL}" >> "${GITHUB_ENV}"
          echo "IOS_BUILD_CONFIGURATION=Debug" >> "${GITHUB_ENV}"
          echo "IOS_DEVICE_ARCHS=${DEVICE_ARCHS}" >> "${GITHUB_ENV}"
          echo "IOS_ALLOW_SOURCE_PAYLOAD=1" >> "${GITHUB_ENV}"
          echo "IOS_ARTIFACT_DIR=platforms/ios/build/artifacts/device/Debug" >> "${GITHUB_ENV}"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install \
            autoconf \
            autoconf-archive \
            automake \
            cmake \
            coreutils \
            gawk \
            glslang \
            gnu-tar \
            ldid \
            libtool \
            ninja \
            p7zip \
            pkg-config
          echo "$(brew --prefix)/bin" >> "${GITHUB_PATH}"
          echo "$(brew --prefix libtool)/libexec/gnubin" >> "${GITHUB_PATH}"
          echo "$(brew --prefix)/opt/gnu-tar/libexec/gnubin" >> "${GITHUB_PATH}"

      - name: Install MoltenVK xcframework
        shell: bash
        env:
          MOLTENVK_XCFRAMEWORK_ZIP_URL: ${{ secrets.MOLTENVK_XCFRAMEWORK_ZIP_URL }}
          MOLTENVK_IOS_TAR_URL: https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar
        run: |
          set -euo pipefail

          WORK_DIR="${RUNNER_TEMP}/moltenvk"
          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}"
          MOLTENVK_INCLUDE_DIR=""

          find_moltenvk_include_dir() {
            local header_path
            header_path="$(find "$1" -type f -path "*/include/vulkan/vulkan.h" -print -quit)"
            if [[ -n "${header_path}" ]]; then
              printf '%s\n' "${header_path%/vulkan/vulkan.h}"
            fi
          }

          select_static_ios_moltenvk_xcframework() {
            local search_root="$1"
            local candidate
            while IFS= read -r candidate; do
              if find "${candidate}" -path "*/ios-*/libMoltenVK.a" ! -path "*simulator*" -print -quit | grep -q .; then
                printf '%s\n' "${candidate}"
                return 0
              fi
            done < <(find "${search_root}" -type d -name MoltenVK.xcframework -print | sort)
            return 0
          }

          if [[ -d "platforms/ios/vendor/MoltenVK.xcframework" ]]; then
            MOLTENVK_DIR="$(select_static_ios_moltenvk_xcframework "${GITHUB_WORKSPACE}/platforms/ios/vendor")"
            MOLTENVK_INCLUDE_DIR="${GITHUB_WORKSPACE}/platforms/ios/vendor/MoltenVK/include"
          elif [[ -n "${MOLTENVK_XCFRAMEWORK_ZIP_URL}" ]]; then
            curl -L "${MOLTENVK_XCFRAMEWORK_ZIP_URL}" -o "${WORK_DIR}/MoltenVK.xcframework.zip"
            unzip -q "${WORK_DIR}/MoltenVK.xcframework.zip" -d "${WORK_DIR}"
            MOLTENVK_DIR="$(select_static_ios_moltenvk_xcframework "${WORK_DIR}")"
            MOLTENVK_INCLUDE_DIR="$(find_moltenvk_include_dir "${WORK_DIR}")"
          else
            curl -L "${MOLTENVK_IOS_TAR_URL}" -o "${WORK_DIR}/MoltenVK-ios.tar"
            /usr/bin/tar -xf "${WORK_DIR}/MoltenVK-ios.tar" -C "${WORK_DIR}"
            MOLTENVK_DIR="$(select_static_ios_moltenvk_xcframework "${WORK_DIR}")"
            MOLTENVK_INCLUDE_DIR="$(find_moltenvk_include_dir "${WORK_DIR}")"
          fi

          if [[ -z "${MOLTENVK_DIR}" || ! -d "${MOLTENVK_DIR}" ]]; then
            echo "::group::Detected MoltenVK xcframeworks"
            find "${WORK_DIR}" "${GITHUB_WORKSPACE}/platforms/ios/vendor" -type d -name MoltenVK.xcframework -print 2>/dev/null || true
            echo "::endgroup::"
            echo "::error::Failed to locate a static iOS MoltenVK.xcframework with an iOS device libMoltenVK.a slice."
            exit 1
          fi

          while IFS= read -r tvos_lib; do
            tvos_archs="$(lipo -archs "${tvos_lib}")"
            if [[ " ${tvos_archs} " == *" arm64e "* ]]; then
              echo "::notice::Found tvOS MoltenVK arm64e slice at ${tvos_lib}, but it cannot be linked into an iOS binary. Provide an iOS arm64e slice to emit a true arm64e iOS app."
            fi
          done < <(find "$(dirname "${MOLTENVK_DIR}")" -path "*/tvos-*/libMoltenVK.a" -print 2>/dev/null || true)

          IOS_DEVICE_LIB=""
          IOS_DEVICE_LIB_ARCHS=""
          while IFS= read -r candidate_lib; do
            candidate_archs="$(lipo -archs "${candidate_lib}")"
            candidate_matches=1
            for required_arch in ${IOS_DEVICE_ARCHS//,/ }; do
              if [[ " ${candidate_archs} " != *" ${required_arch} "* ]]; then
                candidate_matches=0
                break
              fi
            done
            if [[ "${candidate_matches}" == "1" ]]; then
              IOS_DEVICE_LIB="${candidate_lib}"
              IOS_DEVICE_LIB_ARCHS="${candidate_archs}"
              break
            fi
            if [[ -z "${IOS_DEVICE_LIB}" ]]; then
              IOS_DEVICE_LIB="${candidate_lib}"
              IOS_DEVICE_LIB_ARCHS="${candidate_archs}"
            fi
          done < <(find "${MOLTENVK_DIR}" -path "*/ios-*/libMoltenVK.a" ! -path "*simulator*" -print | sort)

          if [[ -z "${IOS_DEVICE_LIB}" ]]; then
            echo "::error::Failed to locate an iOS device MoltenVK slice."
            exit 1
          fi
          for required_arch in ${IOS_DEVICE_ARCHS//,/ }; do
            if [[ " ${IOS_DEVICE_LIB_ARCHS} " != *" ${required_arch} "* ]]; then
              if [[ "${required_arch}" == "arm64e" ]]; then
                echo "::warning::The selected MoltenVK iOS slice has '${IOS_DEVICE_LIB_ARCHS}', not arm64e. Building arm64 only; arm64e devices can run the arm64 slice. Provide platforms/ios/vendor/MoltenVK.xcframework or MOLTENVK_XCFRAMEWORK_ZIP_URL with an iOS arm64e slice to emit a true arm64e binary."
                echo "IOS_DEVICE_ARCHS=arm64" >> "${GITHUB_ENV}"
                break
              fi
              echo "::error::MoltenVK iOS slice is missing required architecture '${required_arch}' (has: ${IOS_DEVICE_LIB_ARCHS})."
              exit 1
            fi
          done

          sudo mkdir -p /usr/local/lib
          sudo rm -rf /usr/local/lib/MoltenVK.xcframework
          sudo cp -R "${MOLTENVK_DIR}" /usr/local/lib/MoltenVK.xcframework
          if [[ -n "${MOLTENVK_INCLUDE_DIR}" && -f "${MOLTENVK_INCLUDE_DIR}/vulkan/vulkan.h" ]]; then
            sudo mkdir -p /usr/local/include
            sudo cp -R "${MOLTENVK_INCLUDE_DIR}/." /usr/local/include/
          fi
          find /usr/local/lib/MoltenVK.xcframework -maxdepth 2 -name libMoltenVK.a -print -exec lipo -archs {} \; || true

      - name: Build and package iOS app
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${IOS_ARTIFACT_DIR}"
          mkdir -p "${IOS_ARTIFACT_DIR}"
          IOS_ENABLE_DEBUG_JIT=0 IOS_ARTIFACT_VARIANT_LABEL=debug-jitless ./platforms/ios/build_xcode_ios.sh device platforms/ios/build/device-debug-jitless "${IOS_ARTIFACT_DIR}"
          IOS_ENABLE_DEBUG_JIT=1 IOS_ARTIFACT_VARIANT_LABEL=debug-jit ./platforms/ios/build_xcode_ios.sh device platforms/ios/build/device-debug-jit "${IOS_ARTIFACT_DIR}"
          find "${IOS_ARTIFACT_DIR}" -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Verify full-size IPA payloads
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob
          import os
          import sys

          min_size = 850 * 1024 * 1024
          ipas = sorted(glob.glob(os.path.join(os.environ["IOS_ARTIFACT_DIR"], "*.ipa")))
          if len(ipas) != 2:
              print(f"::error::Expected exactly 2 debug IPAs, found {len(ipas)}: {ipas}")
              sys.exit(1)
          for ipa in ipas:
              size = os.path.getsize(ipa)
              print(f"{ipa}: {size / (1024 * 1024):.1f} MiB")
              if size < min_size:
                  print(f"::error::{ipa} is too small. The full game data payload was not bundled.")
                  sys.exit(1)
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: warzone2100-ios-${{ env.IOS_ARTIFACT_LABEL }}-${{ env.IOS_BUILD_CONFIGURATION }}
          path: |
            ${{ env.IOS_ARTIFACT_DIR }}/*.ipa
            ${{ env.IOS_ARTIFACT_DIR }}/*.txt
          if-no-files-found: error
